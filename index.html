<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majburiy Blok Test Bot</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #111827); color: var(--tg-theme-text-color, #f3f4f6); }
        .active-tab { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .option-btn:checked + label { background-color: #3b82f6; color: white; border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 font-sans select-none">

    <div id="code-screen" class="max-w-md mx-auto mt-10 text-center">
        <div class="mb-6"><i class="fa-solid fa-graduation-cap text-6xl text-blue-500"></i></div>
        <h2 class="text-2xl font-bold mb-2">Majburiy Blok Testi</h2>
        <p class="text-sm text-gray-400 mb-6">Kanalga tashlangan PDF dagi test kodini kiriting:</p>
        <div class="mb-4">
            <input type="number" id="test-code" placeholder="Masalan: 1234" 
                   class="w-full p-4 rounded-xl border border-gray-700 bg-gray-800 text-white text-center text-xl font-bold focus:outline-none focus:border-blue-500">
        </div>
        <button onclick="checkAndStart()" class="w-full p-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition">
            Testni Boshlash <i class="fa-solid fa-arrow-right ml-2"></i>
        </button>
    </div>

    <div id="test-screen" class="max-w-md mx-auto hidden">
        <div class="flex justify-between items-center bg-gray-800 p-3 rounded-xl mb-4 border border-gray-700">
            <span class="text-sm text-gray-400">Kod: <b id="display-code" class="text-white"></b></span>
            <div class="text-red-500 font-bold flex items-center gap-1">
                <i class="fa-solid fa-clock"></i> <span id="timer">30:00</span>
            </div>
        </div>

        <div class="flex border-b border-gray-700 mb-4 text-center">
            <button id="tab-mat" onclick="switchTab('mat')" class="flex-1 py-3 text-sm active-tab">🧮 Matematika</button>
            <button id="tab-tili" onclick="switchTab('tili')" class="flex-1 py-3 text-sm text-gray-400">📚 Ona tili</button>
            <button id="tab-tarix" onclick="switchTab('tarix')" class="flex-1 py-3 text-sm text-gray-400">🕌 Tarix</button>
        </div>

        <div id="questions-container" class="space-y-4 max-h-[60vh] overflow-y-auto pr-1"></div>

        <div class="mt-6">
            <button onclick="submitTest()" class="w-full p-4 bg-green-600 text-white font-bold rounded-xl shadow-lg hover:bg-green-700 transition">
                <i class="fa-solid fa-paper-plane mr-2"></i> Javoblarni Tasdiqlash
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentTab = 'mat';
        let countdown;
        let totalSeconds = 30 * 60;
        let qCount = 10; // Standart qiymat
        let userAnswers = { mat: {}, tili: {}, tarix: {} };

        // Botdan kelgan start_param orqali kodni avtomat o'qish (agar havola orqali kirilsa)
        window.onload = function() {
            const initDataRaw = tg.initDataUnsafe;
            if (initDataRaw && initDataRaw.start_param) {
                document.getElementById('test-code').value = initDataRaw.start_param;
            }
        }

        function checkAndStart() {
            const code = document.getElementById('test-code').value.trim();
            if(!code) { alert("Test kodini kiriting!"); return; }

            // Botga so'rov yuborish o'rniga, foydalanuvchining o'zi kiritgan kod asosida Web App ishlaydi.
            // Bot orqa fonda Web App yuborgan ma'lumotni qabul qilib, o'zidagi savollar sonini tekshiradi.
            // Admin xohlaganicha (1, 4, 10) savol kirita olishi uchun foydalanuvchiga variantlar kiritish imkonini to'liq beramiz.
            
            document.getElementById('code-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.remove('hidden');
            document.getElementById('display-code').innerText = code;

            renderQuestions();
            startTimer();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            // Admin panel moslashuvchan bo'lgani uchun foydalanuvchiga 10 tagacha variant tanlash imkonini beramiz,
            // lekin admin nechta kalit kiritgan bo'lsa, bot faqat o'shancha savolni hisoblaydi va tekshiradi.
            for (let i = 1; i <= 10; i++) {
                const questionDiv = document.createElement('div');
                questionDiv.className = "bg-gray-800 p-4 rounded-xl border border-gray-700";
                const currentSelection = userAnswers[currentTab][i] || '';

                questionDiv.innerHTML = `
                    <div class="font-semibold mb-3 text-blue-400">${i}-Savol:</div>
                    <div class="grid grid-cols-4 gap-2">
                        ${['a', 'b', 'c', 'd'].map(opt => `
                            <div>
                                <input type="radio" id="q_${currentTab}_${i}_${opt}" name="q_${currentTab}_${i}" value="${opt}" 
                                       class="hidden option-btn" ${currentSelection === opt ? 'checked' : ''}
                                       onchange="saveAnswer('${currentTab}', ${i}, '${opt}')">
                                <label for="q_${currentTab}_${i}_${opt}" 
                                       class="block text-center p-3 rounded-lg border border-gray-700 bg-gray-700 font-bold uppercase cursor-pointer hover:bg-gray-600 transition">
                                    ${opt}
                                </label>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(questionDiv);
            }
        }

        function saveAnswer(subject, qNum, option) { 
            userAnswers[subject][qNum] = option; 
        }

        function switchTab(subject) {
            currentTab = subject;
            document.getElementById('tab-mat').className = "flex-1 py-3 text-sm " + (subject === 'mat' ? 'active-tab' : 'text-gray-400');
            document.getElementById('tab-tili').className = "flex-1 py-3 text-sm " + (subject === 'tili' ? 'active-tab' : 'text-gray-400');
            document.getElementById('tab-tarix').className = "flex-1 py-3 text-sm " + (subject === 'tarix' ? 'active-tab' : 'text-gray-400');
            renderQuestions();
        }

        function startTimer() {
            countdown = setInterval(() => {
                if (totalSeconds <= 0) { clearInterval(countdown); submitTest(); } 
                else {
                    totalSeconds--;
                    let mins = Math.floor(totalSeconds / 60);
                    let secs = totalSeconds % 60;
                    document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function submitTest() {
            clearInterval(countdown);
            const code = document.getElementById('test-code').value.trim();
            
            const payload = {
                code: code,
                answers: userAnswers
            };
            
            tg.sendData(JSON.stringify(payload));
            tg.close();
        }
    </script>
</body>
</html>
